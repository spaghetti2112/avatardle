<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Avatardle</title>
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header: logo left, title + subtitle centered via 3-col grid -->
  <header class="site-header">
    <img src="images/avatar-icon.jpg" alt="Avatar Logo" class="site-logo">
    <div class="site-title-wrap">
      <h1 class="site-title">Avatardle</h1>
      <p class="site-subtitle">One character a day</p>
    </div>
    <img src="images/avatar-icon.jpg" alt="" aria-hidden="true" class="site-logo site-logo-ghost">
  </header>

  <main class="game-container">
    <section class="card hero-card">
      <div class="portrait-wrap">
        <img id="portrait" class="portrait" alt="Mystery character portrait" />
        <div id="portrait-mask" class="portrait-mask"></div>
      </div>

      <div class="meta">
        <div class="chips">
          <span class="chip" id="chip-type">Type: —</span>
          <span class="chip" id="chip-appearance">Series: —</span>
        </div>
        <div class="hints-inline">
          <div class="hint"><img src="images/icon-bending.jpg" class="icon" alt=""><strong id="bending">???</strong></div>
          <div class="hint"><img src="images/icon-origin.jpg" class="icon" alt=""><strong id="origin">???</strong></div>
        </div>
      </div>
    </section>

    <section class="card input-card">
      <div class="guess-row">
        <input type="text" id="guess-input" placeholder="Type a character name…" autocomplete="off" inputmode="text" />
        <button id="submit-guess" class="btn primary">Guess</button>
      </div>
      <div id="suggestions" class="suggestions"></div>
      <div id="feedback" class="feedback" aria-live="polite"></div>
    </section>

    <!-- Hints (no wordle grid) -->
    <section class="card hints-card">
      <h2 class="h2">Hints</h2>
      <ul id="hints-list" class="hints-list"></ul>
    </section>

    <footer class="credits">
      <p>Place images in <code>images/</code> (no leading slash). Filenames should be <em>kebab-case</em> (e.g. <code>aang.svg</code>).</p>
    </footer>
  </main>

  <!-- IMPORTANT: load characters.js BEFORE app.js; use defer to guarantee order -->
  <script src="characters.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
